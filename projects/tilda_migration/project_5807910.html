	<script>
		function waitForScriptsAndInit(fnName, attempt) {
			attempt = attempt || 1;

			if (typeof window[fnName] === 'function') {
				window[fnName]();
				return;
			}

			if (attempt >= 10) {
				return;
			}

			setTimeout(function () {
				waitForScriptsAndInit(fnName, attempt + 1);
			}, 1000);
		}

		document.addEventListener('DOMContentLoaded', function () {
			waitForScriptsAndInit('td__drawPreload');
			waitForScriptsAndInit('td__projectslist__init');
		});

	</script>
